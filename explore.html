<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Explore the complete Improvisation & Acting for Everyday Life playbook — all 20 sections.">
<title>EXPLORE — Improv Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
/* EXPLORE PAGE */
.chapter-nav {
  display: flex; gap: 6px; flex-wrap: nowrap;
  padding: 16px 32px;
  background: var(--bg2);
  border-bottom: 1px solid var(--card-border);
  position: sticky; top: calc(var(--nav-h) + var(--xp-h));
  z-index: 100; overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.chapter-nav::-webkit-scrollbar { display: none; }
.chap-btn {
  flex-shrink: 0;
  padding: 6px 14px; border-radius: 9999px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  background: var(--card-bg); border: 1.5px solid var(--card-border); color: var(--text2);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.chap-btn:hover, .chap-btn.active {
  background: var(--a1); border-color: var(--a1); color: white;
}

.chapter-panel {
  display: none;
  padding: 60px 32px;
  max-width: 1100px; margin: 0 auto;
  animation: panelIn 0.4s cubic-bezier(0.16,1,0.3,1);
}
.chapter-panel.visible { display: block; }
@keyframes panelIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }

/* SCENARIO CARD */
.scenario-card {
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: 24px; padding: 36px 32px;
  width: 100%;
  transition: all 0.3s;
}
.scenario-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
.scenario-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem; letter-spacing: 3px; color: var(--a1);
  margin-bottom: 8px;
}
.scenario-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; margin-bottom: 16px; }

.good-bad-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;
}
.good-card, .bad-card {
  border-radius: 16px; padding: 18px 20px;
}
.bad-card  { background: rgba(255,77,28,0.07); border: 1.5px solid rgba(255,77,28,0.2); }
.good-card { background: rgba(0,200,150,0.07); border: 1.5px solid rgba(0,200,150,0.2); }
.good-bad-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 8px;
}
.bad-card  .good-bad-label { color: var(--a1); }
.good-card .good-bad-label { color: var(--a4); }
.good-bad-body { font-size: 0.9rem; line-height: 1.5; color: var(--text2); }

.script-list { list-style: none; margin-top: 16px; }
.script-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 10px;
  background: rgba(0,87,255,0.05); margin-bottom: 8px;
  font-size: 0.9rem; line-height: 1.5; color: var(--text);
  font-style: italic;
  border-left: 3px solid var(--a3);
}

/* WARNING CARD */
.warning-card {
  background: var(--card-bg);
  border: 2px solid var(--card-border);
  border-radius: 20px; padding: 28px 28px;
  position: relative; overflow: hidden;
}
.warning-card::before {
  content: '⚠️';
  position: absolute; font-size: 6rem; opacity: 0.05;
  top: -10px; right: 10px; line-height: 1;
}
.warning-card h3 { color: var(--a1); margin-bottom: 12px; font-size: 1.1rem; }

/* BOOK CARD */
.book-card {
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: 16px; padding: 20px 22px;
  display: flex; gap: 14px; align-items: flex-start;
  transition: all 0.2s;
}
.book-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); border-color: var(--a1); }
.book-spine {
  width: 10px; flex-shrink: 0;
  align-self: stretch;
  border-radius: 3px;
}
.book-info { flex: 1; min-width: 0; }
.book-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 4px; color: var(--text); }
.book-author { font-size: 0.8rem; color: var(--text2); }

/* ACCORDION heading */
.acc-section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 4vw, 56px);
  margin-bottom: 8px;
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-dot"></div>
<canvas id="particle-canvas" aria-hidden="true"></canvas>

<nav role="navigation" aria-label="Main navigation">
  <a href="index.html" class="nav-logo">IMPROV⚡QUEST</a>
  <div class="nav-links">
    <a href="index.html"   class="nav-link">Home</a>
    <a href="explore.html" class="nav-link active" aria-current="page">Explore</a>
    <a href="play.html"    class="nav-link">Play</a>
    <a href="daily.html"   class="nav-link">Daily</a>
  </div>
  <div class="nav-controls">
    <button id="sound-toggle" class="nav-icon-btn" title="Toggle sound" aria-label="Toggle sound">🔊</button>
    <button id="dark-toggle"  class="nav-icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
  </div>
</nav>

<div id="xp-bar-container" role="status">
  <span class="xp-label">Level <span id="xp-level">1</span></span>
  <div id="xp-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"><div id="xp-fill"></div></div>
  <div class="xp-stats">
    <span class="xp-stat">XP <span id="xp-total">0</span></span>
    <span class="xp-stat">🔥 <span id="xp-streak">0</span></span>
  </div>
</div>

<div id="achievement-pop" role="alert" aria-live="polite"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<main class="page-body">

<!-- CHAPTER NAV -->
<nav class="chapter-nav" aria-label="Chapter navigation" id="chapter-nav">
  <!-- JS fills -->
</nav>

<!-- PANELS -->
<div id="panels-container"></div>

</main>

<footer>
  <p><strong>IMPROV QUEST</strong> — Improvisation &amp; Acting for Everyday Life · A Comprehensive, Critical, Practical Playbook</p>
  <p style="margin-top:6px;">Info current as of May 21, 2026.</p>
</footer>

<script src="js/content.js"></script>
<script src="js/engine.js"></script>
<script>
// ── CHAPTER CONFIG ─────────────────────────────────────────
const CHAPTERS = [
  { id: 'ch1',   label: '1. Unscripted',   build: buildCh1   },
  { id: 'ch2',   label: '2. Skills',        build: buildCh2   },
  { id: 'ch3',   label: '3. Yes And',       build: buildCh3   },
  { id: 'ch4',   label: '4. Acting Tools',  build: buildCh4   },
  { id: 'ch5',   label: '5. Improv Tools',  build: buildCh5   },
  { id: 'ch6',   label: '6. Scenarios',     build: buildCh6   },
  { id: 'ch7',   label: '7. Psychology',    build: buildCh7   },
  { id: 'ch8',   label: '8. Warnings',      build: buildCh8   },
  { id: 'ch9',   label: '9. Practice Sys',  build: buildCh9   },
  { id: 'ch10',  label: '10. Playbook',     build: buildCh10  },
  { id: 'ch11',  label: '11. 30-Day Plan',  build: buildCh11  },
  { id: 'ch12',  label: '12. Exercises',    build: buildCh12  },
  { id: 'ch13',  label: '13. By Type',      build: buildCh13  },
  { id: 'ch14',  label: '14. Authenticity', build: buildCh14  },
  { id: 'ch15',  label: '15. Study',        build: buildCh15  },
  { id: 'ch16',  label: '16. Books',        build: buildCh16  },
  { id: 'ch18',  label: '18. Principles',   build: buildCh18  },
  { id: 'ch19',  label: '19. Weekly',       build: buildCh19  },
  { id: 'ch20',  label: '20. Bottom Line',  build: buildCh20  }
];

// ── HELPERS ────────────────────────────────────────────────
const h = (tag, attrs, inner) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if (k==='class') el.className=v; else if (k==='style') el.style.cssText=v; else el.setAttribute(k,v); });
  if (inner !== undefined) el.innerHTML = inner;
  return el;
};
const colorVar = { red:'a1', blue:'a3', green:'a4', yellow:'a2', pink:'a5', orange:'a7', purple:'a6' };

// ── CAROUSEL BUILDER ───────────────────────────────────────
const buildCarousel = (id, slides, minH = '200px') => {
  const wrap = h('div', { class: 'carousel-wrap', id });
  const track = h('div', { class: 'carousel-track', style: `min-height:${minH}` });
  slides.forEach(el => track.appendChild(el));
  const nav = document.createElement('div');
  nav.className = 'carousel-nav';
  nav.innerHTML = `<button class="carousel-prev" aria-label="Previous">←</button><span class="carousel-counter">1 / ${slides.length}</span><button class="carousel-next" aria-label="Next">→</button>`;
  wrap.appendChild(track);
  wrap.appendChild(nav);
  return wrap;
};

const makeSlide = (html) => { const d = document.createElement('div'); d.innerHTML = html; return d; };

// ── CHAPTER BUILDERS ──────────────────────────────────────
function buildCh1(panel) {
  const s = C.section1;
  panel.innerHTML = `
    <div class="section-label">Section 1</div>
    <h2 class="acc-section-title">The Big Idea: Life is Mostly <span style="color:var(--a1)">Unscripted</span></h2>
    <p style="font-size:1rem;line-height:1.7;color:var(--text2);max-width:720px;margin-bottom:32px;">${s.body}</p>
    <blockquote style="font-size:1.1rem;margin-bottom:32px;">${s.keyLine}</blockquote>
    <p style="font-size:0.95rem;color:var(--text2);margin-bottom:32px;">${s.contrastBody}</p>`;

  // Table carousel
  const slides = s.table.map(row => makeSlide(`
    <div class="card" style="max-width:700px;margin:0 auto;padding:36px 32px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--a1);margin-bottom:16px;">${row.person}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div style="background:rgba(0,200,150,0.07);border:1.5px solid rgba(0,200,150,0.2);border-radius:12px;padding:16px;">
          <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--a4);margin-bottom:6px;">Strength</div>
          <div style="font-weight:700;font-size:1rem;">${row.strength}</div>
        </div>
        <div style="background:rgba(255,77,28,0.06);border:1.5px solid rgba(255,77,28,0.2);border-radius:12px;padding:16px;">
          <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--a1);margin-bottom:6px;">Weakness</div>
          <div style="font-weight:700;font-size:1rem;">${row.weakness}</div>
        </div>
      </div>
    </div>`));
  const carousel = buildCarousel('ch1-carousel', slides, '260px');
  panel.appendChild(carousel);
  setTimeout(() => Engine.initCarousel(carousel), 50);

  const goalDiv = h('div', { class: 'drill-box', style: 'margin-top:32px;' }, `<h4>The Goal</h4><p>${s.goal}</p>`);
  panel.appendChild(goalDiv);

  Engine.progress.markRead('section-1');
}

function buildCh2(panel) {
  panel.innerHTML = `
    <div class="section-label">Section 2</div>
    <h2 class="acc-section-title">The Core Skills Improv &amp; Acting <span style="color:var(--a1)">Develop</span></h2>
    <p style="font-size:1rem;line-height:1.7;color:var(--text2);max-width:720px;margin-bottom:32px;">Six foundational capacities trained by improvisation and acting practice.</p>`;

  const slides = C.skills.map(skill => {
    const cv = colorVar[skill.color] || 'a1';
    return makeSlide(`
      <div class="card card--${skill.color}" style="max-width:800px;margin:0 auto;padding:40px 36px;position:relative;">
        <div class="card-accent-line"></div>
        <div style="font-size:3rem;margin-bottom:16px;">${skill.icon}</div>
        <span class="badge badge-${skill.color}" style="margin-bottom:12px;">${skill.num}</span>
        <h3 style="font-size:clamp(24px,3vw,36px);margin-bottom:16px;">${skill.title}</h3>
        <p style="font-size:0.95rem;line-height:1.7;color:var(--text2);margin-bottom:16px;">${skill.body}</p>
        ${skill.keyPrinciple ? `<blockquote>${skill.keyPrinciple}</blockquote>` : ''}
        ${skill.lifeProblems ? `
          <p style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--${cv});margin:16px 0 8px;">In daily life, lack of this looks like:</p>
          <ul style="padding-left:18px;">${skill.lifeProblems.map(p=>`<li style="font-size:0.88rem;color:var(--text2);line-height:1.7;margin-bottom:4px;">${p}</li>`).join('')}</ul>
        ` : ''}
        ${skill.evidence ? `<p style="font-size:0.85rem;font-style:italic;color:var(--text2);margin-top:16px;line-height:1.6;border-left:3px solid var(--${cv});padding-left:14px;">${skill.evidence}</p>` : ''}
        ${skill.drill ? `
          <div class="drill-box" style="margin-top:20px;">
            <h4>${skill.drill.title}</h4>
            <p>${skill.drill.body || ''}</p>
            ${skill.drill.steps ? `<ol style="padding-left:18px;margin-top:8px;">${skill.drill.steps.map(s=>`<li style="font-size:0.88rem;color:var(--text2);margin-bottom:6px;">${s}</li>`).join('')}</ol>` : ''}
            ${skill.drill.tones ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">${skill.drill.tones.map(t=>`<span class="badge badge-${skill.color}">${t}</span>`).join('')}</div>` : ''}
            ${skill.drill.example ? `
              <div style="margin-top:12px;background:var(--bg);border-radius:10px;padding:14px;">
                <p style="font-size:0.85rem;margin-bottom:6px;font-style:italic;">A: ${skill.drill.example.personA}</p>
                <p style="font-size:0.85rem;color:var(--a1);margin-bottom:4px;">✗ ${skill.drill.example.weak}</p>
                <p style="font-size:0.85rem;color:var(--a4);">✓ ${skill.drill.example.better}</p>
              </div>` : ''}
            ${skill.drill.sentence ? `
              <p style="font-size:0.9rem;font-style:italic;margin-top:8px;color:var(--text);">Say: <strong>"${skill.drill.sentence}"</strong></p>
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">${skill.drill.tones ? skill.drill.tones.map(t=>`<span class="badge badge-${skill.color}">${t}</span>`).join('') : ''}</div>` : ''}
            ${skill.drill.note ? `<p style="margin-top:10px;font-style:italic;font-size:0.83rem;color:var(--text3);">${skill.drill.note}</p>` : ''}
          </div>` : ''}
        ${skill.uses ? `
          <div style="margin-top:20px;">
            <p style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:8px;">Everyday Uses</p>
            <div class="pill-list">${skill.uses.map(u=>`<span class="pill-item">${u}</span>`).join('')}</div>
          </div>` : ''}
      </div>`);
  });
  const carousel = buildCarousel('ch2-carousel', slides, '500px');
  panel.appendChild(carousel);
  setTimeout(() => Engine.initCarousel(carousel), 50);
  Engine.progress.markRead('skills');
}

function buildCh3(panel) {
  const y = C.yesAnd;
  panel.innerHTML = `
    <div class="section-label">Section 3</div>
    <h2 class="acc-section-title">The "Yes, And" Principle — <span style="color:var(--a4)">Properly Understood</span></h2>
    <p style="font-size:0.95rem;color:var(--text2);line-height:1.7;margin-bottom:20px;">${y.misconceptions}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px;">
      <div style="background:rgba(255,77,28,0.06);border:1.5px solid rgba(255,77,28,0.2);border-radius:16px;padding:24px;">
        <p style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--a1);margin-bottom:12px;">It Does NOT Mean</p>
        <ul style="padding-left:16px;">${y.itDoesNotMean.map(m=>`<li style="font-size:0.88rem;color:var(--text2);margin-bottom:6px;line-height:1.5;">${m}</li>`).join('')}</ul>
      </div>
      <div style="background:rgba(0,200,150,0.06);border:1.5px solid rgba(0,200,150,0.2);border-radius:16px;padding:24px;">
        <p style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--a4);margin-bottom:12px;">It Means</p>
        <p style="font-size:1rem;font-weight:700;color:var(--text);line-height:1.5;">${y.itMeans}</p>
        <p style="font-size:0.85rem;color:var(--text2);margin-top:10px;font-style:italic;">${y.note}</p>
      </div>
    </div>`;

  const slides = y.examples.map(ex => makeSlide(`
    <div class="card" style="max-width:700px;margin:0 auto;padding:36px;">
      <span class="badge badge-blue" style="margin-bottom:16px;">${ex.label}</span>
      <p style="font-size:0.9rem;color:var(--text2);margin-bottom:20px;font-style:italic;">${ex.context}</p>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="bad-card good-bad-grid" style="grid-template-columns:1fr;">
          <p class="good-bad-label">Blocking Response</p>
          <p class="good-bad-body">${ex.blocking}</p>
        </div>
        <div class="good-card good-bad-grid" style="grid-template-columns:1fr;">
          <p class="good-bad-label">"Yes, And" Response</p>
          <p class="good-bad-body">${ex.yesAnd}</p>
        </div>
      </div>
    </div>`));
  const carousel = buildCarousel('ch3-carousel', slides, '280px');
  panel.appendChild(carousel);
  setTimeout(() => Engine.initCarousel(carousel), 50);

  const adv = y.advanced;
  const advDiv = h('div', { class: 'drill-box', style: 'margin-top:32px;' });
  advDiv.innerHTML = `
    <h4>${adv.title}</h4>
    <p>${adv.intro}</p>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:14px 0;">
      ${adv.steps.map((s,i)=>`
        <div style="background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:12px;padding:14px 16px;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--a1);margin-bottom:4px;">${s.key}</div>
          <p style="font-size:0.85rem;color:var(--text2);">${s.desc}</p>
        </div>`).join('')}
    </div>
    <blockquote style="margin-top:16px;">${adv.example}</blockquote>
    <p style="font-style:italic;font-size:0.85rem;color:var(--text3);margin-top:8px;">${adv.note}</p>`;
  panel.appendChild(advDiv);
  Engine.progress.markRead('yes-and');
}

function buildCh4(panel) {
  panel.innerHTML = `
    <div class="section-label">Section 4</div>
    <h2 class="acc-section-title">Acting Tools for <span style="color:var(--a3)">Everyday Life</span></h2>
    <p style="font-size:0.95rem;color:var(--text2);margin-bottom:32px;">Five performance-derived tools that transform how you understand and navigate real interactions.</p>`;

  const slides = C.actingTools.map(tool => {
    const cv = colorVar[tool.color] || 'a1';
    return makeSlide(`
      <div class="card card--${tool.color}" style="max-width:800px;margin:0 auto;padding:40px 36px;position:relative;">
        <div class="card-accent-line"></div>
        <div style="font-size:3rem;margin-bottom:12px;">${tool.icon}</div>
        <span class="badge badge-${tool.color}" style="margin-bottom:12px;">${tool.num}</span>
        <h3 style="font-size:clamp(22px,3vw,34px);margin-bottom:16px;">${tool.title}</h3>
        <p style="font-size:0.95rem;line-height:1.7;color:var(--text2);margin-bottom:16px;">${tool.body || tool.question || ''}</p>
        ${tool.wants ? `<div class="pill-list" style="margin-bottom:20px;">${tool.wants.map(w=>`<span class="pill-item">${w}</span>`).join('')}</div>` : ''}
        ${tool.question && tool.body ? `<blockquote style="margin-bottom:20px;">${tool.question}</blockquote>` : ''}
        ${tool.table ? `
          <div class="table-wrap">
            <table>
              <thead><tr>${Object.keys(tool.table[0]).map(k=>`<th>${k}</th>`).join('')}</tr></thead>
              <tbody>${tool.table.map(r=>`<tr>${Object.values(r).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
            </table>
          </div>` : ''}
        ${tool.high ? `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;">
            <div style="background:rgba(0,200,150,0.06);border:1.5px solid rgba(0,200,150,0.2);border-radius:14px;padding:18px;">
              <p style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--a4);margin-bottom:10px;">High-Status</p>
              <ul style="padding-left:16px;">${tool.high.map(i=>`<li style="font-size:0.85rem;color:var(--text2);margin-bottom:4px;">${i}</li>`).join('')}</ul>
            </div>
            <div style="background:rgba(255,77,28,0.06);border:1.5px solid rgba(255,77,28,0.2);border-radius:14px;padding:18px;">
              <p style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--a1);margin-bottom:10px;">Low-Status</p>

// ── CHAPTER ROUTING ───────────────────────────────────────
function showChapter(id) {
  document.querySelectorAll('.chapter-panel').forEach(p => p.classList.remove('visible'));
  document.querySelectorAll('.chap-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('panel-' + id);
  if (panel) {
    panel.classList.add('visible');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  const btn = document.getElementById('btn-' + id);
  if (btn) btn.classList.add('active');
  Engine.Sound.pop();
  Engine.progress.markRead(id);
}

// ── INIT ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  Engine.init();

  const nav = document.getElementById('chapter-nav');
  const container = document.getElementById('panels-container');

  CHAPTERS.forEach((ch, idx) => {
    // Nav button
    const btn = document.createElement('button');
    btn.className = 'chap-btn' + (idx === 0 ? ' active' : '');
    btn.id = 'btn-' + ch.id;
    btn.textContent = ch.label;
    btn.addEventListener('click', () => showChapter(ch.id));
    nav.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'chapter-panel' + (idx === 0 ? ' visible' : '');
    panel.id = 'panel-' + ch.id;
    container.appendChild(panel);
    ch.build(panel);
  });

  // Handle URL hash for drills section
  if (window.location.hash === '#drills') {
    showChapter('ch12');
  }

  // Check achievements
  const read = Object.keys(Engine.progress.getRead());
  if (['skills','acting-tools','improv-tools'].every(k => read.some(r => r.includes(k.split('-')[0])))) {
    Engine.achievements.unlock('all_skills');
    Engine.achievements.unlock('deep_dive');
  }
});
</script>
